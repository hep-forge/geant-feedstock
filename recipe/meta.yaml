{% set versions = {
    "0.0.0": "REPLACE_WITH_SHA256"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'geant')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://github.com/eic/geant4/archive/refs/tags/{{ version }}.tar.gz"   # TODO: confirm upstream's actual tag/tarball naming
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    # TODO: library dependencies
  run:
    # TODO: runtime dependencies

test:
  commands:
    - echo "TODO: a real smoke test"

about:
  home: "https://github.com/eic/geant4"
  license: "Apache-2.0"
  summary: "Geant4 detector simulation toolkit (eic label: EIC's eAST-physics-list fork)"

extra:
  recipe-maintainers:
    - meiyasan
