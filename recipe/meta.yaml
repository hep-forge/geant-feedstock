{% set versions = {
    "11.4.1": "fb0090b005563311a866e3b40804ff762dc1d00d81f8aa881ba872538608a719"
} %}
{% set commits = {
    "11.4.1": "0efa58fb6848c2e0f50362d017c2526bf95dcf01"
} %}
# Geant4's own tag (e.g. "11.4.1") is that project's internal release
# counter -- it does NOT mean "Geant generation 11". This package name
# ("geant") is shared across generations (a future Geant3 build lives on
# the "old" label; this Geant4 build is the "main"/default one -- this
# whole channel is EIC-dedicated, so there's no separate "eic" label),
# so the published conda version is prefixed with the actual generation
# number ("4.") to stay unambiguous even if someone compares versions
# across labels. An epoch (1!) is required alongside the rename:
# without it, conda would read "4.11.4.1" as numerically OLDER than the
# already-published "11.4.1" (4 < 11 in the first component) and never
# offer it as an upgrade.
# NOTE: use plain "#" comments here, not Jinja "{# #}" block comments --
# the publish workflow's Trim Old Versions step regex-strips only
# "{% %}"/"{{ }}" before yaml.safe_load'ing this file directly (no Jinja
# render), so a literal "{# #}" block survives and breaks that parse.
{% set published_versions = {
    "11.4.1": "1!4.11.4.1"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'geant')|string|lower %}

# The CI workflow always sets ANACONDA_VERSION (derived from the git
# tag, e.g. "11.4.1") before invoking conda-build, so environ.get's
# fallback below never actually fires for the normal tag-driven build
# path -- map through published_versions on whichever value wins first,
# tag-driven or manually overridden, so the generation-prefixed/epoched
# form is always what actually gets published.
{% set _raw_version = environ.get('ANACONDA_VERSION', version) %}

package:
  name: {{ name }}
  version: {{ published_versions.get(_raw_version, _raw_version)|replace("-", ".") }}

source:
  # eic/geant4's "east-vX.Y.Z" branches are exactly vanilla Geant4 vX.Y.Z
  # plus one additive commit (the eAST baseline physics list, no build-system
  # changes) -- pin the exact commit rather than the mutable branch tip.
  url: "https://github.com/eic/geant4/archive/{{ commits.get(version, version) }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}
  folder: src

build:
  number: 0
  string: "east"
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - make  # [unix]
    - sed
  host:
    - python
    - libboost-python-devel
    - clhep =2.4.7.2
    - expat
    - zlib
    - freetype
    - libglu  # [linux]
    - qt6-main
    - xerces-c
    - xorg-libx11
    - xorg-libxfixes
    - xorg-libxmu
    - xorg-libxt
    - libgl-devel  # [linux]
  run:
    - python
    - expat
    - zlib
    - libglu  # [linux]
    - freetype  # [unix]
    - xorg-libx11
    - xorg-libxmu
    - xorg-libxt
    - libgl-devel  # [linux]
    - xorg-libxfixes  # [linux]
    # versions taken from cmake/Modules/G4DatasetDefinitions.cmake at this
    # tag, matched against what conda-forge's geant4-data-* feedstocks
    # actually publish (their own recipe's stated ".0"-suffix convention
    # doesn't hold for all of these -- verified directly against
    # conda-forge's noarch repodata rather than assumed).
    - geant4-data-abla =3.3
    - geant4-data-emlow =8.8.0
    - geant4-data-ensdfstate =3.0
    - geant4-data-incl =1.3.0
    - geant4-data-ndl =4.7.1
    - geant4-data-particlexs =4.2.0
    - geant4-data-photonevaporation =6.1.2
    - geant4-data-pii =1.3
    - geant4-data-radioactivedecay =6.1.2
    - geant4-data-realsurface =2.2
    - geant4-data-saiddata =2.0
    - geant4-data-channeling =2.0.0

test:
  requires:
    - cmake
    - make  # [unix]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  commands:
    - geant4-config --version
    - bash "${RECIPE_DIR}/test_geant4.sh"

about:
  home: "https://github.com/eic/geant4"
  dev_url: "https://github.com/eic/geant4"
  doc_url: "https://geant4.web.cern.ch/support"
  license: "LicenseRef-Geant4"
  license_file: src/LICENSE
  summary: "Geant4 detector simulation toolkit, EIC eAST-physics-list fork"
  description: |
    This build is github.com/eic/geant4, branch east-v11.4.1 -- vanilla
    Geant4 11.4.1 plus one additive commit registering "eASTPhysicsList",
    the baseline physics list used across EIC detector simulation. No
    build-system changes versus vanilla Geant4. This is hep-forge's
    default/"main"-label geant build -- this whole channel is
    EIC-dedicated, so there's no separate "eic" label; a future Geant3
    build would live on the "old" label instead. Published under the
    package name "geant" (not "geant4") so it doesn't get silently
    shadowed by conda-forge's own same-named, numerically newer geant4
    package under flexible channel priority; the published version is
    prefixed with the actual Geant generation number ("4.") so it stays
    unambiguous against a future Geant3 build under this same name.

extra:
  recipe-maintainers:
    - meiyasan
